name: OSS Pulse Daily Digest
on:
  schedule:
    - cron: '0 1 * * *'  # 08:00 UTC+7
  workflow_dispatch:
concurrency:
  group: osspulse-digest
  cancel-in-progress: false
permissions:
  contents: write
jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: astral-sh/setup-uv@v4
      - name: Install OSS Pulse
        run: uv sync
      - name: Run digest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: uv run osspulse run
      - name: Persist state
        if: always()
        run: |
          git config user.name 'OSS Pulse Bot'
          git config user.email 'osspulse-bot@users.noreply.github.com'
          mkdir -p .osspulse
          git add -f .osspulse/state.json 2>/dev/null || true
          git diff --cached --quiet || (git commit -m 'chore: update digest state [skip ci]' && git push)
