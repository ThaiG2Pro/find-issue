[watchlist]
repos = [
    "getlago/lago",
    "langfuse/langfuse",
    "openmeterio/openmeter",
    "flexprice/flexprice",
]
lookback_days = 1

[llm]
provider = "groq"
model = "groq/llama-3.3-70b-versatile"
api_key_env = "LLM_API_KEY"

[state]
state_path = "./.osspulse/state.json"

[output]
destination = "discord"

[discord]
use_embeds = true
